name: build

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .github/workflows/build.yaml

permissions:
  contents: write
  packages: write

concurrency:
  group: build-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install tools (skopeo, jq)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y skopeo jq

      - name: Resolve upstream + compute release tag
        id: meta
        env:
          UPSTREAM_IMAGE: zerotier/zerotier:latest
          STATE_FILE: .github/upstream-state.json
        run: |
          set -euo pipefail

          docker pull "${UPSTREAM_IMAGE}"

          upstream_repo_digest="$(docker image inspect --format '{{index .RepoDigests 0}}' "${UPSTREAM_IMAGE}")"
          upstream_digest="${upstream_repo_digest#*@}"

          version="$(
            docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.version" }}' "${UPSTREAM_IMAGE}" 2>/dev/null || true
          )"
          if [[ -z "${version}" ]]; then
            version="$(
              timeout 15s docker run --rm --entrypoint sh "${UPSTREAM_IMAGE}" -lc '
                set -eu
                for c in "zerotier-one -v" "/usr/sbin/zerotier-one -v" "zerotier-one --version"; do
                  bin="${c%% *}"
                  if command -v "$bin" >/dev/null 2>&1; then
                    $c 2>&1 | head -n 1
                    exit 0
                  fi
                done
                exit 1
              ' 2>/dev/null || true
            )"
            version="$(printf '%s' "${version}" | grep -Eo '[0-9]+\\.[0-9]+\\.[0-9]+' | head -n 1 || true)"
          fi

          if [[ -z "${version}" ]]; then
            echo "Failed to detect upstream ZeroTier version from ${UPSTREAM_IMAGE}." >&2
            exit 1
          fi

          old_version="$(jq -r '.upstream_version // ""' "${STATE_FILE}" 2>/dev/null || echo "")"
          old_digest="$(jq -r '.upstream_digest // ""' "${STATE_FILE}" 2>/dev/null || echo "")"
          old_rev="$(jq -r '.revision // 0' "${STATE_FILE}" 2>/dev/null || echo "0")"
          if [[ "${old_rev}" == "null" || -z "${old_rev}" ]]; then old_rev=0; fi

          should_release="true"
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" && "${upstream_digest}" == "${old_digest}" && "${version}" == "${old_version}" ]]; then
            should_release="false"
          fi

          if [[ "${should_release}" == "true" ]]; then
            if [[ "${version}" == "${old_version}" && -n "${old_version}" ]]; then
              rev="$((old_rev + 1))"
            else
              rev="1"
            fi
            tag="${version}-r${rev}"

            updated_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            tmp="$(mktemp)"
            jq -n \
              --arg upstream_image "${UPSTREAM_IMAGE}" \
              --arg upstream_digest "${upstream_digest}" \
              --arg upstream_version "${version}" \
              --arg last_release_tag "${tag}" \
              --arg updated_at "${updated_at}" \
              --argjson revision "${rev}" \
              '{upstream_image:$upstream_image,upstream_digest:$upstream_digest,upstream_version:$upstream_version,revision:$revision,last_release_tag:$last_release_tag,updated_at:$updated_at}' \
              > "${tmp}"
            mv "${tmp}" "${STATE_FILE}"

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "${STATE_FILE}"
            git commit -m "chore(release): ${tag}"
            git push origin "HEAD:${GITHUB_REF_NAME}"

            commit_sha="$(git rev-parse HEAD)"
          else
            tag=""
            rev=""
            commit_sha="$(git rev-parse HEAD)"
          fi

          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"
          echo "upstream_digest=${upstream_digest}" >> "$GITHUB_OUTPUT"
          echo "upstream_version=${version}" >> "$GITHUB_OUTPUT"
          echo "revision=${rev}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${commit_sha}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: steps.meta.outputs.should_release == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        if: steps.meta.outputs.should_release == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          pull: true
          push: true
          build-args: |
            ZT_UPSTREAM=zerotier/zerotier@${{ steps.meta.outputs.upstream_digest }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/zerotier-mikrotik:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/zerotier-mikrotik:latest

      - name: Pull built image locally
        if: steps.meta.outputs.should_release == 'true'
        run: docker pull ghcr.io/${{ github.repository_owner }}/zerotier-mikrotik:${{ steps.meta.outputs.tag }}

      - name: Export RouterOS-friendly archive (docker-archive)
        if: steps.meta.outputs.should_release == 'true'
        id: export
        env:
          SRC_IMAGE: ghcr.io/${{ github.repository_owner }}/zerotier-mikrotik:${{ steps.meta.outputs.tag }}
          ARCHIVE_REF: zerotier-mikrotik:${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          tar_path="zerotier-mikrotik-${{ steps.meta.outputs.tag }}-arm64.tar"
          skopeo copy \
            --override-os linux \
            --override-arch arm64 \
            "docker-daemon:${SRC_IMAGE}" \
            "docker-archive:${tar_path}:${ARCHIVE_REF}"
          sha_path="${tar_path}.sha256"
          sha256sum "${tar_path}" > "${sha_path}"
          echo "tar_path=${tar_path}" >> "$GITHUB_OUTPUT"
          echo "sha_path=${sha_path}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.meta.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ steps.meta.outputs.commit_sha }}
          name: ${{ steps.meta.outputs.tag }}
          body: |
            Upstream: `${{ steps.meta.outputs.upstream_version }}` (`${{ steps.meta.outputs.upstream_digest }}`)

            RouterOS import (example):
            - Upload `${{ steps.export.outputs.tar_path }}` to RouterOS storage (e.g. `disk1/`)
            - `/container/add file=disk1/${{ steps.export.outputs.tar_path }} interface=veth1 root-dir=disk1/zerotier name=zerotier logging=yes`
            - `/container/start 0` (adjust container ID)
          files: |
            ${{ steps.export.outputs.tar_path }}
            ${{ steps.export.outputs.sha_path }}
